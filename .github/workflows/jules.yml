name: Jules Agent Workflow

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Instructions for Jules'
        required: true
        default: 'Review the codebase and suggest improvements.'

jobs:
  run-jules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: ${{ github.event.inputs.prompt }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
